name: 开发版构建并上传产物

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 开发版构建
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: 解析开发版构建信息
        id: meta
        shell: bash
        run: |
          chmod +x gradlew

          # 读取项目当前的基础版本号, 例如 1.0.0-SNAPSHOT
          base_version="$(./gradlew --quiet printVersion)"

          # 使用当前提交的 7 位短哈希, 区分不同开发构建
          short_sha="${GITHUB_SHA::7}"
          artifact_version="${base_version}-${short_sha}"
          release_tag="${base_version}"
          jar_name="BayMcWhiteList-${artifact_version}.jar"

          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "artifact_version=${artifact_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "jar_name=${jar_name}" >> "$GITHUB_OUTPUT"

      - name: 执行开发版构建
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean build -PartifactVersionOverride=${{ steps.meta.outputs.artifact_version }} -PgitCommitShort=${GITHUB_SHA::7}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: BayMcWhiteList Artifact
          path: build/libs/${{ steps.meta.outputs.jar_name }}
          if-no-files-found: error
          retention-days: 14

      - name: 更新开发版标签
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "${{ steps.meta.outputs.release_tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ steps.meta.outputs.release_tag }}" --force

      - name: 生成开发版预发布说明
        if: github.event_name == 'push'
        id: snapshot_notes
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/snapshot-release-notes.md"
          commit_message="$(git log -1 --pretty=%B)"

          {
            echo "最新自动开发版构建"
            echo
            echo "- 基础版本: ${{ steps.meta.outputs.base_version }}"
            echo "- 构建文件: ${{ steps.meta.outputs.jar_name }}"
            echo "- 提交哈希: ${GITHUB_SHA::7}"
            echo
            echo "## 提交信息"
            echo
            printf '%s\n' "$commit_message"
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: 清理旧的开发版预发布
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq '
            .[]
            | select(.prerelease == true)
            | select(.tag_name == "SNAPSHOT" or (.tag_name | endswith("-SNAPSHOT")))
            | select(.tag_name != env.CURRENT_TAG)
            | "\(.id)\t\(.tag_name)"' |
          while IFS=$'\t' read -r release_id tag_name; do
            if [ -z "$release_id" ] || [ -z "$tag_name" ]; then
              continue
            fi

            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            git push origin ":refs/tags/${tag_name}" || true
          done

      - name: 创建或更新开发版预发布
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.release_tag }}
          TITLE: BayMcWhiteList ${{ steps.meta.outputs.base_version }}
          NOTES_FILE: ${{ steps.snapshot_notes.outputs.notes_file }}
          JAR_NAME: ${{ steps.meta.outputs.jar_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE" --prerelease --target "$GITHUB_SHA"
          else
            gh release create "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE" --prerelease --target "$GITHUB_SHA"
          fi

          while IFS= read -r asset_name; do
            if [ -n "$asset_name" ]; then
              gh release delete-asset "$TAG" "$asset_name" --yes
            fi
          done < <(gh release view "$TAG" --json assets --jq '.assets[].name')

          gh release upload "$TAG" "build/libs/$JAR_NAME"
