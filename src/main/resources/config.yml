# BayMcWhiteList 配置文件
# MySQL 是白名单状态的唯一数据源, 除非有其他组件负责同步数据库
# 否则不要在受保护服务器上启用原版白名单

# 语言文件配置
# 插件会从 plugins/BayMcWhiteList/lang/ 目录加载该文件
# 文件名只允许使用字母, 数字, 下划线, 点, 横线, 并且必须以 yml 或 yaml 结尾
language:
  file: "zh_CN.yml"

# 当前服务器配置
# 每台安装本插件的服务器都需要按自身用途配置 name 和 mode
server:
  # 当前服务器在白名单网络中的唯一名称, 会写入 MySQL 审计日志和白名单来源字段
  # 多端部署时建议每台服务器使用不同名称, 例如 login, survival-1, lobby-1
  name: "login"

  # 当前服务器的工作模式
  # login: 登录/验证服, 允许玩家进入并使用 /whitelist <邀请码> 完成白名单验证
  # protected: 主服或玩法服, 玩家加入前必须已存在于 MySQL 白名单表中
  # protected 模式下如果数据库不可用, 会拒绝玩家加入, 避免误放未过白玩家
  mode: "login"

# 邀请码生成和校验配置
# 所有登录服, 网站, 机器人或其他邀请码生成端必须保持本节配置一致
code:
  # 玩家看到的邀请码格式类似 BAYMC-XXXXXXXX
  # 该值会自动转为大写, 只允许字母, 数字和下划线, 长度 1 到 24
  # 前缀会参与 HMAC 签名, 修改后旧前缀的邀请码将无法继续匹配
  prefix: "BAYMC"

  # 生产环境使用前必须在每台服务器上修改, 所有生成 BayMC 邀请码的
  # 服务器, 网站或机器人都必须使用同一个密钥
  # 该值不能为空, 建议使用足够长的随机字符串, 不要公开给玩家
  # 修改密钥后, 修改前生成的邀请码会立即失效
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"

  # 使用 RFC4648 Base32 字符: A-Z 和 2-7
  # 允许范围 4 到 52, 数值越大邀请码越长, 也越难被猜测
  suffix-length: 8

  # 验证时会按配置时区检查今天以及前 valid-days - 1 个自然日
  # 允许范围 1 到 365, 例如 7 表示当天和往前 6 个自然日都可验证
  valid-days: 7

  # 邀请码签发日期和过期时间使用的时区
  # 必须是 Java ZoneId 支持的时区名称, 例如 Asia/Shanghai 或 UTC
  # 所有生成和验证邀请码的组件必须使用同一个时区
  timezone: "Asia/Shanghai"

  # 是否区分玩家输入的邀请码大小写
  # false 时玩家可以输入小写邀请码, 插件会按大写进行比较
  # true 时必须与生成结果大小写完全一致
  case-sensitive: false

# 安全配置
security:
  verify-rate-limit:
    # 是否启用 /whitelist 邀请码验证防爆破总开关
    # false 时玩家维度和 IP 维度都会被关闭, 插件只做基础邀请码格式与有效期校验
    enabled: true

    # 是否启用玩家维度限制
    # true 时同一个玩家 UUID 连续输错邀请码会被临时锁定
    # 建议保持开启, 这是最不容易误伤正常玩家的基础防护
    player-enabled: true

    # 单个玩家在窗口期内允许的邀请码错误次数, 允许范围 1 到 1000
    # 只有 player-enabled 为 true 时生效
    max-failures-per-player: 5

    # 玩家失败次数统计窗口, 单位秒, 允许范围 1 到 86400
    # 只有 player-enabled 为 true 时生效
    player-window-seconds: 300

    # 是否启用 IP 维度限制
    # true 时同一 IP 下多个玩家连续输错邀请码也会触发临时锁定
    # 如果服务器在 Velocity/Bungee 后面, 请先确认真实 IP 转发配置正确
    # 如果大量玩家来自同一出口 IP, 例如宿舍, 校园网, 网吧或同家庭网络, 可单独关闭该项
    ip-enabled: true

    # 单个 IP 在窗口期内允许的邀请码错误次数, 允许范围 1 到 1000
    # 只有 ip-enabled 为 true 时生效
    max-failures-per-ip: 20

    # IP 失败次数统计窗口, 单位秒, 允许范围 1 到 86400
    # 只有 ip-enabled 为 true 时生效
    ip-window-seconds: 300

    # 触发限制后锁定验证的时间, 单位秒, 允许范围 1 到 86400
    lock-seconds: 600

    # 触发锁定或锁定期间再次尝试时是否踢出玩家
    kick-on-lock: true

    # 锁定期间重复尝试时审计日志最短写入间隔, 单位秒, 允许范围 1 到 86400
    blocked-log-interval-seconds: 60

    # 触发邀请码验证限流时是否输出后台警告
    notify-console: true

    # 触发邀请码验证限流时是否通知本服在线管理员
    notify-admins: true

    # 接收安全通知需要的权限, 只允许小写字母, 数字, 下划线, 点和横线
    notify-permission: "baymcwhitelist.notify"

    # 同一玩家或 IP 重复触发通知的最短间隔, 单位秒, 允许范围 1 到 86400
    notify-interval-seconds: 60

# 玩家身份标识配置
# 当前阶段只支持 Mojang UUID 作为白名单唯一键
player:
  # 可选值: mojang
  # 玩家名只作为 Mojang 查询入口; 邀请码、白名单判断和移除都绑定到标准 UUID
  # 离线服请先确保服务器/代理提供的 UUID 与 Mojang UUID 策略一致
  uuid-source: "mojang"

# 撤销白名单配置
remove:
  # 管理员撤销白名单后, 如果目标玩家当前就在本服务器在线, 是否允许执行踢出总开关
  # 该功能只影响当前服务器, 不会跨 Velocity/Bungee 或其他子服踢人
  kick-online-player: true

  # 允许执行撤销踢出的服务器模式列表
  # 默认只在 protected 受保护服务器踢出, login 登录服不踢出, 方便玩家留在登录服重新查看状态或再次验证
  # 可选值: login, protected
  # 如果希望所有模式都不踢出, 可以设置为空列表: []
  kick-server-modes:
    - "protected"

# 存储配置
# 白名单记录和审计日志都会写入 MySQL, 本插件不会把白名单状态保存到本地文件
storage:
  mysql:
    # MySQL 服务器地址, 可以是 IP, 域名或容器服务名; IPv6 需要写成 [::1]
    host: "127.0.0.1"

    # MySQL 端口, 允许范围 1 到 65535
    port: 3306

    # 插件使用的数据库名, 启动前需要确保该数据库已存在且账号有权限访问
    database: "baymc"

    # MySQL 用户名
    username: "root"

    # MySQL 密码
    password: "password"

    # 插件数据表前缀, 最终表名为 table-prefix + whitelist_players 和 table-prefix + whitelist_logs
    # 只允许字母, 数字和下划线, 最大长度 32, 可以留空
    # 多个网络或测试服共用同一个数据库时, 建议使用不同表前缀隔离数据
    table-prefix: "baymcwhitelist_"

    # 是否在 JDBC 连接中启用 SSL
    # 如果数据库要求加密连接则改为 true, 否则保持 false
    use-ssl: false

    # 是否允许 MySQL Connector/J 从服务端请求 RSA 公钥
    # 仅在未启用 SSL 且数据库账号认证方式需要时打开; 生产环境建议优先启用 SSL 或配置可信公钥
    allow-public-key-retrieval: false

    # HikariCP 连接池配置
    # 时间单位均为毫秒, 如果不确定含义建议保持默认值
    pool:
      # 连接池最大连接数, 允许范围 1 到 64
      # 多服务器共用同一 MySQL 时需要结合数据库连接上限一起规划
      maximum-pool-size: 10

      # 空闲时尽量保留的最小连接数, 允许范围 0 到 64
      # 不能大于 maximum-pool-size
      minimum-idle: 2

      # 从连接池借出连接时的最长等待时间, 允许范围 250 到 120000
      # 超时后本次数据库操作会失败
      connection-timeout: 10000

      # 空闲连接允许保留的最长时间, 允许范围 10000 到 3600000
      # 只有连接数高于 minimum-idle 时才会回收空闲连接
      idle-timeout: 600000

      # 单个连接的最长生命周期, 允许范围 30000 到 7200000
      # 建议小于 MySQL 服务端 wait_timeout, 避免拿到已被服务端关闭的连接
      max-lifetime: 1800000
