# BayMcWhiteList 配置文件
# MySQL 是白名单状态的唯一数据源, 除非有其他组件负责同步数据库
# 否则不要在受保护服务器上启用原版白名单

code:
  # 玩家看到的邀请码格式类似 BAYMC-XXXXXXXX
  prefix: "BAYMC"

  # 生产环境使用前必须在每台服务器上修改, 所有生成 BayMC 邀请码的
  # 服务器, 网站或机器人都必须使用同一个密钥
  secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"

  # 使用 RFC4648 Base32 字符: A-Z 和 2-7
  suffix-length: 8

  # 验证时会按配置时区检查今天以及前 valid-days - 1 个自然日
  valid-days: 7
  timezone: "Asia/Shanghai"
  case-sensitive: false

player:
  # 正版 online-mode 服务器建议使用 uuid, 离线服或外置登录网络中
  # 如果玩家名才是稳定账号标识, 可以使用 name
  id-type: "uuid"

storage:
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "baymc"
    username: "root"
    password: "password"
    table-prefix: "baymc_"
    use-ssl: false
    pool:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

server:
  # 登录/验证服使用 login, 需要拒绝未写入 MySQL 玩家进入的主服或玩法服使用 protected
  name: "login"
  mode: "login"

language:
  file: "zh_CN.yml"
