prefix: "<dark_gray>[</dark_gray><aqua>BayMC</aqua><white>白名单</white><dark_gray>]</dark_gray> "

common:
  no-permission: "<prefix><red>你没有权限使用该命令</red>"
  only-player: "<prefix><red>该命令只能由玩家执行</red>"
  unknown-command: "<prefix><red>未知子命令</red>"
